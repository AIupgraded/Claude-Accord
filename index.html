<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Accord</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="landing">

  <!-- Header -->
  <header class="site-header">
    <h1 class="site-title">Claude <em>Accord</em></h1>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <p class="tagline"><strong>Stop</strong> scrolling. <strong>Start</strong> thinking.</p>

      <div class="tier-buttons">
        <button class="tier-btn" data-tier="personal">Personal</button>
        <button class="tier-btn" data-tier="business">Business</button>
        <button class="tier-btn" data-tier="creative">Creative</button>
      </div>

      <div class="cta-wrapper">
        <button class="cta-btn" id="stepInBtn">Step In<span class="cta-sub">click here</span></button>
      </div>
    </div>

    <div class="hero-rule"></div>

    <footer class="hero-footer">
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="gdpr.html">Privacy</a>
    </footer>
  </section>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <h2>Welcome</h2>
      <p class="modal-sub">Choose how you'd like to enter.</p>
      <div class="modal-options">
        <a href="guest.html" class="modal-option">
          <span class="option-label">Guest</span>
          <span class="option-desc">Browse freely, no account needed</span>
        </a>
        <a href="login.html" class="modal-option">
          <span class="option-label">Log In</span>
          <span class="option-desc">Access your saved prompts</span>
        </a>
        <a href="signup.html" class="modal-option">
          <span class="option-label">Sign Up</span>
          <span class="option-desc">Create your account</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    const stepInBtn = document.getElementById('stepInBtn');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');

    stepInBtn.addEventListener('click', () => {
      modalOverlay.classList.add('active');
    });

    modalClose.addEventListener('click', () => {
      modalOverlay.classList.remove('active');
    });

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) {
        modalOverlay.classList.remove('active');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        modalOverlay.classList.remove('active');
      }
    });

    // Tier button selection
    document.querySelectorAll('.tier-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
  </script>
</body>
</html>
