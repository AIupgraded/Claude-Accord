<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Accord</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>

    /* ===== Header with auth ===== */

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2vh 40px;
      border-bottom: 1px solid var(--gold);
      flex-shrink: 0;
    }

    .site-title {
      font-size: clamp(2rem, 4.5vw, 3.5rem);
    }

    .header-auth {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-auth .auth-logged-out {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .header-auth .auth-logged-in {
      display: none;
      align-items: center;
      gap: 14px;
    }

    .greeting {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 0.3px;
    }

    .btn-header {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(0.85rem, 1.5vw, 1.15rem);
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: clamp(10px, 1.5vh, 16px) clamp(20px, 3vw, 40px);
      border: 1px solid rgba(201, 169, 110, 0.4);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-header:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-header.primary {
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-header.primary:hover {
      background: var(--gold);
      color: var(--bg);
    }

    .btn-header.ghost-small {
      border-color: transparent;
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 6px 12px;
    }

    .btn-header.ghost-small:hover {
      color: var(--text);
      border-color: var(--border);
    }

    @media (max-width: 768px) {
      .site-header { padding: 1.5vh 20px; }
      .header-auth .btn-header { font-size: 0.72rem; padding: 7px 14px; }
    }

    @media (max-width: 480px) {
      .header-auth .auth-logged-out { gap: 6px; }
    }
  </style>
</head>
<body class="landing">

  <!-- Header -->
  <header class="site-header">
    <h1 class="site-title">Claude <em>Accord</em></h1>

    <div class="header-auth">
      <!-- Logged out -->
      <div class="auth-logged-out">
        <a href="login.html" class="btn-header">Log In</a>
        <a href="signup.html" class="btn-header primary">Sign Up</a>
      </div>
      <!-- Logged in -->
      <div class="auth-logged-in">
        <span class="greeting" id="headerGreeting"></span>
        <button class="btn-header ghost-small" onclick="handleLogout()">Sign out</button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <p class="tagline"><strong>Stop</strong> scrolling. <strong>Start</strong> thinking.</p>

      <div class="tier-buttons">
        <button class="tier-btn" data-tier="personal">Personal</button>
        <button class="tier-btn" data-tier="business">Business</button>
        <button class="tier-btn" data-tier="creative">Creative</button>
      </div>

      <div class="cta-wrapper">
        <button class="cta-btn" id="stepInBtn">Step In<span class="cta-sub">click here</span></button>
      </div>
    </div>

    <footer class="hero-footer">
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="gdpr.html">Privacy</a>
    </footer>
  </section>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>

    // ===== Greeting options =====
    // Stored in user metadata as greeting_style
    // Options: 'hello', 'welcome', 'good', 'peace'
    const greetingTemplates = {
      hello:   name => `Hello, ${name}`,
      welcome: name => `Welcome back, ${name}`,
      good:    name => `Good to see you, ${name}`,
      peace:   name => `Peace, ${name}`
    };

    function buildGreeting(user) {
      const name = user.user_metadata?.full_name
        || user.user_metadata?.name
        || user.email?.split('@')[0]
        || 'friend';
      const style = user.user_metadata?.greeting_style || 'hello';
      const fn = greetingTemplates[style] || greetingTemplates.hello;
      return fn(name);
    }

    // ===== Auth state on landing =====
    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof supabase === 'undefined') return;

      const { data: { user } } = await supabase.auth.getUser();

      const loggedOut = document.querySelector('.header-auth .auth-logged-out');
      const loggedIn  = document.querySelector('.header-auth .auth-logged-in');
      const greetingEl = document.getElementById('headerGreeting');

      if (user) {
        loggedOut.style.display = 'none';
        loggedIn.style.display  = 'flex';
        greetingEl.textContent  = buildGreeting(user);
      } else {
        loggedOut.style.display = 'flex';
        loggedIn.style.display  = 'none';
      }
    });

    // ===== Tier buttons — mutual exclusive + toggle off =====
    let selectedTier = null;

    document.querySelectorAll('.tier-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tier = btn.dataset.tier;

        if (selectedTier === tier) {
          btn.classList.remove('selected');
          selectedTier = null;
        } else {
          document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedTier = tier;
        }
      });
    });

    // ===== Step In — navigate to the appropriate page =====
    document.getElementById('stepInBtn').addEventListener('click', () => {
      const page = selectedTier || 'info';
      window.location.href = page + '.html';
    });

  </script>
</body>
</html>
