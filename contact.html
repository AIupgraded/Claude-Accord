<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Claude Accord</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Nav -->
  <nav>
    <div class="container">
      <a href="index.html" class="logo">Claude <span>Accord</span></a>
      <button class="hamburger" onclick="toggleNav()">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="guest.html">Preview</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
        <li class="auth-logged-out"><a href="login.html" class="btn btn-ghost">Log in</a></li>
        <li class="auth-logged-out"><a href="signup.html" class="btn btn-primary">Sign up</a></li>
        <li class="auth-logged-in" style="display:none"><a href="#" onclick="handleLogout()" class="btn btn-ghost">Log out</a></li>
      </ul>
    </div>
  </nav>

  <!-- Contact Form -->
  <div class="container">
    <div class="form-container" style="max-width:560px">
      <h2>Get in Touch</h2>
      <p class="subtitle">Have a question, suggestion, or partnership idea? We'd love to hear from you.</p>
      <div class="alert" id="contact-alert"></div>
      <form onsubmit="handleContact(event)">
        <div class="form-group">
          <label for="contact-name">Name</label>
          <input type="text" id="contact-name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="contact-email">Email</label>
          <input type="email" id="contact-email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
          <label for="contact-message">Message</label>
          <textarea id="contact-message" placeholder="How can we help?" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Send Message</button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="gdpr.html">Privacy / GDPR</a>
      </div>
      <p>&copy; 2026 Claude Accord. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    async function handleContact(e) {
      e.preventDefault();
      const alertEl = document.getElementById('contact-alert');
      const name = document.getElementById('contact-name').value.trim();
      const email = document.getElementById('contact-email').value.trim();
      const message = document.getElementById('contact-message').value.trim();

      if (!name || !email || !message) {
        showAlert(alertEl, 'Please fill in all fields.', 'error');
        return;
      }

      const { error } = await supabase.from('contacts').insert([{ name, email, message }]);

      if (error) {
        showAlert(alertEl, 'Something went wrong. Please try again.', 'error');
        return;
      }

      showAlert(alertEl, 'Message sent! We will get back to you soon.', 'success');
      e.target.reset();
    }
  </script>
</body>
</html>
